<!DOCTYPE html>

<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Controle de Frequência</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
}

.cards{
display:flex;
gap:10px;
margin-bottom:20px;
}

.card{
flex:1;
background:#eee;
padding:15px;
border-radius:6px;
text-align:center;
cursor:pointer;
}

.card h3{
margin:0;
font-size:28px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

.alerta{
background:#ffe0e0;
padding:10px;
margin-bottom:15px;
border-radius:6px;
}

textarea{
width:100%;
height:100px;
margin-top:10px;
}

</style>

</head>

<body>

<div class="container">

<h2>Controle de Frequência</h2>

<button onclick="abrirImportar()">Colar relatório</button>

<div id="alertas"></div>

<h3>Painel geral das turmas</h3>

<div id="painelTurmas"></div>

<hr>

<select id="turma"></select>

<canvas id="grafico"></canvas>

<h3>Alunos</h3>

<table>

<thead>
<tr>
<th>Aluno</th>
<th>Faltas</th>
<th>Situação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<div id="importar" style="display:none">

<h3>Colar relatório</h3>

<textarea id="texto"></textarea>

<button onclick="processar()">Processar</button>

</div>

</div>

<script>

const SHEET_ID="1NBBtdsqbR4FzNyNsCuG3K3HdSRk6QzT-QR2mnjHEXJ0";

let dados=[];
let chart;

function classificar(f){

if(f<=14) return "Frequentando";
if(f<=30) return "Risco";
if(f<=41) return "Possível desistência";
return "Desistente";

}

function carregarTurmas(){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Turmas`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

const select=document.getElementById("turma");

rows.forEach(r=>{

let turma=r.c[0].v;

let opt=document.createElement("option");

opt.value=turma;
opt.textContent=turma;

select.appendChild(opt);

carregarResumo(turma);

});

select.addEventListener("change",()=>carregarDados(select.value));

carregarDados(rows[0].c[0].v);

});

}

function carregarResumo(turma){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(turma)}`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

let freq=0;
let risco=0;
let poss=0;
let desist=0;

rows.forEach(r=>{

let f=r.c[1]?.v||0;

let c=classificar(f);

if(c==="Frequentando")freq++;
else if(c==="Risco")risco++;
else if(c==="Possível desistência")poss++;
else desist++;

});

let div=document.createElement("div");

div.className="card";

div.innerHTML=`

<b>${turma}</b><br>
Frequentando: ${freq}<br>
Risco: ${risco}<br>
Possível desistência: ${poss}<br>
Desistentes: ${desist}

`;

document.getElementById("painelTurmas").appendChild(div);

if(desist>5){

document.getElementById("alertas").innerHTML+=`
<div class="alerta">
⚠ ${turma} possui ${desist} alunos desistentes
</div>
`;

}

});

}

function carregarDados(turma){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(turma)}`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

dados=[];

rows.forEach(r=>{

dados.push({

aluno:r.c[0]?.v,
faltas:r.c[1]?.v||0

});

});

mostrar();

});

}

function mostrar(){

let freq=0;
let risco=0;
let poss=0;
let desist=0;

const tabela=document.getElementById("tabela");

tabela.innerHTML="";

dados.forEach(a=>{

let c=classificar(a.faltas);

if(c==="Frequentando")freq++;
else if(c==="Risco")risco++;
else if(c==="Possível desistência")poss++;
else desist++;

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${a.aluno}</td>
<td>${a.faltas}</td>
<td>${c}</td>
`;

tabela.appendChild(tr);

});

if(chart)chart.destroy();

chart=new Chart(document.getElementById("grafico"),{

type:"pie",

data:{
labels:["Frequentando","Risco","Possível desistência","Desistente"],
datasets:[{
data:[freq,risco,poss,desist]
}]
}

});

}

function abrirImportar(){

document.getElementById("importar").style.display="block";

}

function processar(){

let texto=document.getElementById("texto").value;

let linhas=texto.split("\n");

dados=[];

linhas.forEach(l=>{

let partes=l.trim().split(" ");

let faltas=parseInt(partes.pop());

let nome=partes.join(" ");

dados.push({

aluno:nome,
faltas:faltas

});

});

mostrar();

}

carregarTurmas();

</script>

</body>
</html>
