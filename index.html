<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Painel de Frequência</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
}

select,input{
padding:8px;
margin-bottom:15px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

.card{
display:inline-block;
padding:10px 20px;
margin:5px;
background:#eee;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>Painel de Frequência</h2>

<select id="turma">

<option value="Eletrotecnica_010">Eletrotecnica 010</option>
<option value="Eletrotecnica_011">Eletrotecnica 011</option>
<option value="Eletrotecnica_012">Eletrotecnica 012</option>

</select>

<br>

<div id="cards"></div>

<canvas id="grafico"></canvas>

<h3>Lista de alunos</h3>

<input id="busca" placeholder="Buscar aluno">

<table>

<thead>
<tr>
<th>Aluno</th>
<th>Faltas</th>
<th>Classificação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const SHEET_ID="1NBBtdsqbR4FzNyNsCuG3K3HdSRk6QzT-QR2mnjHEXJ0";

let dados=[];

document.getElementById("turma").addEventListener("change",carregar);

document.getElementById("busca").addEventListener("input",filtrar);

carregar();

function carregar(){

const aba=document.getElementById("turma").value;

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${aba}`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

dados=[];

rows.forEach(r=>{

dados.push({

aluno:r.c[0]?.v,
faltas:r.c[1]?.v || 0

});

});

mostrar(dados);

});

}

function classificar(f){

if(f<=14) return "Frequentando";
if(f<=30) return "Risco";
if(f<=41) return "Possível desistência";
return "Desistente";

}

function mostrar(lista){

let freq=0;
let risco=0;
let poss=0;
let desist=0;

const tabela=document.getElementById("tabela");

tabela.innerHTML="";

lista.forEach(a=>{

let c=classificar(a.faltas);

if(c==="Frequentando") freq++;
else if(c==="Risco") risco++;
else if(c==="Possível desistência") poss++;
else desist++;

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${a.aluno}</td>
<td>${a.faltas}</td>
<td>${c}</td>
`;

tabela.appendChild(tr);

});

document.getElementById("cards").innerHTML=`

<div class="card">Frequentando: ${freq}</div>
<div class="card">Risco: ${risco}</div>
<div class="card">Possível desistência: ${poss}</div>
<div class="card">Desistentes: ${desist}</div>

`;

new Chart(document.getElementById("grafico"),{

type:"pie",

data:{
labels:["Frequentando","Risco","Possível desistência","Desistente"],
datasets:[{
data:[freq,risco,poss,desist]
}]
}

});

}

function filtrar(){

const termo=document.getElementById("busca").value.toLowerCase();

const filtrados=dados.filter(a=>a.aluno.toLowerCase().includes(termo));

mostrar(filtrados);

}

</script>

</body>
</html>
