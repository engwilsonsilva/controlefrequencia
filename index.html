<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Painel de Frequência</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #ddd;
}

</style>

</head>

<body>

<div class="container">

<h2>Painel de Frequência</h2>

<select id="turma"></select>

<canvas id="grafico"></canvas>

<h3>Lista de alunos</h3>

<table>

<thead>
<tr>
<th>Aluno</th>
<th>Faltas</th>
<th>Situação</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

</div>

<script>

const SHEET_ID="1NBBtdsqbR4FzNyNsCuG3K3HdSRk6QzT-QR2mnjHEXJ0";

let dados=[];
let chart;

function carregarTurmas(){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=Turmas`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

const select=document.getElementById("turma");

rows.forEach(r=>{

let turma=r.c[0]?.v;

let opt=document.createElement("option");

opt.value=turma;
opt.textContent=turma;

select.appendChild(opt);

});

select.addEventListener("change",()=>carregarDados(select.value));

carregarDados(rows[0].c[0].v);

});

}

function carregarDados(turma){

fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(turma)}`)
.then(res=>res.text())
.then(data=>{

const json=JSON.parse(data.substring(47).slice(0,-2));

const rows=json.table.rows;

dados=[];

rows.forEach(r=>{

dados.push({

aluno:r.c[0]?.v,
faltas:r.c[1]?.v || 0

});

});

mostrar();

});

}

function classificar(f){

if(f<=14) return "Frequentando";
if(f<=30) return "Risco";
if(f<=41) return "Possível desistência";
return "Desistente";

}

function mostrar(){

let freq=0;
let risco=0;
let poss=0;
let desist=0;

const tabela=document.getElementById("tabela");

tabela.innerHTML="";

dados.forEach(a=>{

let c=classificar(a.faltas);

if(c==="Frequentando") freq++;
else if(c==="Risco") risco++;
else if(c==="Possível desistência") poss++;
else desist++;

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${a.aluno}</td>
<td>${a.faltas}</td>
<td>${c}</td>
`;

tabela.appendChild(tr);

});

if(chart){
chart.destroy();
}

chart=new Chart(document.getElementById("grafico"),{

type:"pie",

data:{
labels:["Frequentando","Risco","Possível desistência","Desistente"],
datasets:[{
data:[freq,risco,poss,desist]
}]
}

});

}

carregarTurmas();

</script>

</body>

</html>
